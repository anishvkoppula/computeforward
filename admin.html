<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ComputeForward — Applications</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#07070b; --card:#101019; --border:#1c1c2a; --border-bright:#2a2a3e;
    --accent:#00e0ff; --text:#ecedf3; --muted:#8c8da0; --dim:#4f5066;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);padding:2.5rem 1.5rem;min-height:100vh}
  .wrap{max-width:960px;margin:0 auto}
  h1{font-size:1.5rem;letter-spacing:-0.5px;display:flex;align-items:center;gap:.6rem}
  h1::before{content:'';width:9px;height:9px;background:var(--accent);border-radius:2px;transform:rotate(45deg);box-shadow:0 0 12px var(--accent)}
  .sub{color:var(--muted);font-size:.85rem;margin:.4rem 0 2rem;font-family:'JetBrains Mono',monospace}
  .bar{display:flex;gap:.5rem;margin-bottom:1.5rem;flex-wrap:wrap}
  input{flex:1;min-width:200px;padding:.7rem 1rem;background:var(--card);border:1px solid var(--border-bright);border-radius:8px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.85rem;outline:none}
  input:focus{border-color:var(--accent)}
  button{padding:.7rem 1.3rem;background:var(--accent);color:var(--bg);border:none;border-radius:8px;font-family:'Sora',sans-serif;font-weight:600;font-size:.85rem;cursor:pointer}
  button:hover{box-shadow:0 0 20px rgba(0,224,255,.3)}
  .count{font-family:'JetBrains Mono',monospace;color:var(--accent);font-size:.8rem;margin-bottom:1rem}
  .msg{color:var(--dim);font-family:'JetBrains Mono',monospace;font-size:.85rem;padding:2rem 0;text-align:center}
  table{width:100%;border-collapse:collapse;font-size:.85rem}
  th{text-align:left;padding:.7rem .9rem;color:var(--muted);font-weight:500;font-family:'JetBrains Mono',monospace;font-size:.7rem;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--border-bright)}
  td{padding:.85rem .9rem;border-bottom:1px solid var(--border);vertical-align:top}
  tr:hover td{background:var(--card)}
  .lvl{font-family:'JetBrains Mono',monospace;font-size:.72rem;padding:.2rem .55rem;border-radius:4px;background:rgba(0,224,255,.1);color:var(--accent);border:1px solid rgba(0,224,255,.2);white-space:nowrap}
  .email a{color:var(--accent);text-decoration:none}
  .when{color:var(--dim);font-family:'JetBrains Mono',monospace;font-size:.72rem;white-space:nowrap}
  .card-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;overflow-x:auto}
</style>
</head>
<body>
<div class="wrap">
  <h1>ComputeForward — Applications</h1>
  <p class="sub">Private dashboard · enter your admin token to view incoming applications</p>

  <div class="bar">
    <input id="token" type="password" placeholder="Admin token" autocomplete="off">
    <button onclick="load()">Load applications</button>
  </div>

  <div class="count" id="count"></div>
  <div class="card-wrap">
    <table id="table" style="display:none">
      <thead>
        <tr><th>Name</th><th>Email</th><th>Grade</th><th>Level</th><th>Submitted</th></tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </div>
  <div class="msg" id="msg">Enter your token and click “Load applications.”</div>
</div>

<script>
  const tokenInput = document.getElementById('token');
  // remember token locally so you don't retype it
  tokenInput.value = localStorage.getItem('cf_admin_token') || '';

  function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
  function fmt(iso){const d=new Date(iso);return isNaN(d)?iso:d.toLocaleString();}

  async function load(){
    const token = tokenInput.value.trim();
    const msg = document.getElementById('msg');
    const table = document.getElementById('table');
    const rows = document.getElementById('rows');
    const count = document.getElementById('count');
    if(!token){ msg.textContent='Please enter your admin token.'; return; }
    localStorage.setItem('cf_admin_token', token);
    msg.textContent='Loading…'; msg.style.display='block'; table.style.display='none'; count.textContent='';
    try{
      const res = await fetch('/api/applications', { headers:{ 'x-admin-token': token }});
      if(res.status===401){ msg.textContent='Wrong token. Try again.'; return; }
      const data = await res.json();
      const apps = data.applications || [];
      if(!apps.length){ msg.textContent='No applications yet.'; return; }
      rows.innerHTML = apps.map(a=>`
        <tr>
          <td>${esc(a.name)}</td>
          <td class="email"><a href="mailto:${esc(a.email)}">${esc(a.email)}</a></td>
          <td>${esc(a.grade||'—')}</td>
          <td><span class="lvl">${esc(a.level)}</span></td>
          <td class="when">${esc(fmt(a.submittedAt))}</td>
        </tr>`).join('');
      count.textContent = data.count + ' application' + (data.count===1?'':'s');
      table.style.display='table'; msg.style.display='none';
    }catch(e){ msg.textContent='Could not reach the server. Is it running?'; }
  }

  tokenInput.addEventListener('keydown', e=>{ if(e.key==='Enter') load(); });
</script>
</body>
</html>
